# =============================================================================
# Tmux Configuration
# =============================================================================

# --- Prefix ------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General -----------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*256col*:Tc"  # true color
set -g mouse on
set -g base-index 1              # windows start at 1
setw -g pane-base-index 1        # panes start at 1
set -g renumber-windows on       # renumber on close
set -g set-clipboard on
set -g history-limit 50000
set -sg escape-time 0            # no delay for escape
set -g allow-rename off           # manual renames stick
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:#{s|/[^/]*$||:pane_current_path}}/#{b:pane_current_path}"
set -g focus-events on           # for vim autoread
set -g status-interval 5
set -g detach-on-destroy off     # don't exit tmux when closing a session

# --- Vi Mode ----------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# --- Splits -----------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Navigation (vim-tmux-navigator aware) ----------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# --- Resize Panes -----------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Session / Window Management --------------------------------------------
bind S command-prompt -p "New session:" "new-session -A -s '%%'"
bind K confirm kill-session
bind BTab switch-client -l          # switch to last session

# --- Quick Reload -----------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- Popups (tmux 3.2+) ----------------------------------------------------
bind g display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "lazygit"
bind G display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "gh dash"
bind C display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "claude"

# --- Status Bar (Catppuccin Mocha theme) ------------------------------------
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left
set -g status-left-length 50
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#89b4fa] "

# Window tabs
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[bg=#313244,fg=#cba6f7,bold]  #I:#W #[default]"
setw -g window-status-separator ""

# Right
set -g status-right-length 80
set -g status-right "#[fg=#6c7086]  #{?client_prefix,#[fg=#f38ba8]PREFIX,} #[fg=#a6adc8]│ %H:%M #[fg=#a6adc8]│ %b %d "

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message style
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# =============================================================================
# Plugins (via TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'omerxx/tmux-sessionx'

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

set -g @sessionx-bind 'o'
set -g @sessionx-window-mode 'on'
set -g @sessionx-zoxide-mode 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
