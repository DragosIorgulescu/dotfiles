# =============================================================================
# Tmux Configuration
# =============================================================================

# --- Prefix ------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General -----------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*256col*:Tc"  # true color
set -g mouse on
set -g base-index 1              # windows start at 1
setw -g pane-base-index 1        # panes start at 1
set -g renumber-windows on       # renumber on close
set -g set-clipboard on
set -g history-limit 50000
set -sg escape-time 0            # no delay for escape
set -g allow-rename off           # manual renames stick
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:#{s|/[^/]*$||:pane_current_path}}/#{b:pane_current_path}"
set -g set-titles on            # drive the terminal/Ghostty window+tab title
set -g set-titles-string "#S · #W"   # title = session · window  (project · task)
set -g focus-events on           # for vim autoread
set -g status-interval 5
set -g detach-on-destroy off     # don't exit tmux when closing a session

# --- Vi Mode ----------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# --- Splits -----------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Navigation (vim-tmux-navigator aware) ----------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# --- Resize Panes -----------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Session / Window Management --------------------------------------------
bind S command-prompt -p "New session:" "new-session -A -s '%%'"
bind X confirm kill-session         # X, not K — K is resize-pane -U
bind BTab switch-client -l          # switch to last session

# --- Quick Reload -----------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- Popups (tmux 3.2+) ----------------------------------------------------
bind g display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "lazygit"
bind G display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "gh dash"
bind C display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "claude"

# --- Cheatsheet (prefix ?) --------------------------------------------------
# Curated quick reference; overrides the default list-keys binding.
# Press q (or Escape) to close. Edit the text between CHEAT ... CHEAT below.
bind -N "Show this cheatsheet" ? display-popup -E -w 80% -h 90% \
  -b rounded -S "fg=#89b4fa" -s "bg=#1e1e2e,fg=#cdd6f4" \
  -T "#[align=centre,fg=#cba6f7,bold] tmux cheatsheet " \
  "less -R <<'CHEAT'

  tmux cheatsheet                              prefix = Ctrl-a

  SESSIONS ──────────────────────────────────────────────────
    tl / ta / tn      ls / attach / new session  (shell aliases)
    prefix o          sessionx fuzzy switcher  (best)
    prefix S          new session (prompts for name)
    prefix s          session tree picker
    prefix BTab       switch to last session   (Shift-Tab)
    prefix X          kill current session
    prefix d          detach (tmux keeps running)

  WINDOWS  (the tabs in the top bar) ────────────────────────
    prefix c          new window
    prefix 1 … 9      jump to window by number
    prefix n / p      next / previous window
    prefix l          last window (toggle back)
    prefix w          window tree picker
    prefix ,          rename window
    prefix &          close window            (asks y/n)

  PANES  (the splits inside a window) ───────────────────────
    prefix |          split vertical  (side by side)
    prefix -          split horizontal (stacked)
    Ctrl-h/j/k/l      focus pane  left/down/up/right  (no prefix)
    prefix z          zoom pane fullscreen / restore
    prefix H/J/K/L    resize pane  (hold to repeat)
    prefix Space      cycle layouts
    prefix !          break pane into its own window
    prefix x          close pane              (asks y/n)

  COPY MODE  (vi) ───────────────────────────────────────────
    prefix [          enter copy mode / scroll back
    v  /  Ctrl-v      begin selection / rectangle toggle
    y                 copy selection to macOS clipboard
    q  /  Escape      cancel copy mode

  POPUPS ────────────────────────────────────────────────────
    prefix g          lazygit          prefix G   gh dash
    prefix C          claude           prefix ?   this sheet
    prefix r          reload tmux config       prefix T   toggle theme

  Mouse is on: click a pane to focus, drag borders to resize,
  click a tab to switch.            Press  q  to close.

CHEAT
"

# =============================================================================
# Theme — Catppuccin Mocha (hand-rolled, default) or Dracula
# =============================================================================
# Selected by the TMUX_THEME env var, read at config-parse time:
#   • unset / anything → catppuccin (default; nothing changes)
#   • "dracula"        → dracula
# Switch it:
#   • Live toggle:       prefix T
#   • Persist a default: export TMUX_THEME=dracula   (in ~/.zshrc.local)
#
# Dracula is deliberately NOT managed by TPM: TPM discovers @plugin lines by
# text-parsing this file (ignoring %if), so it would source dracula in BOTH
# modes and clobber the catppuccin bar. Instead it lives at ~/.tmux/dracula and
# self-installs on first use (see the run-shell at the bottom); the install
# scripts also pre-fetch it. The theme is applied at the very BOTTOM of this
# file — after the TPM run — so whichever theme is selected always wins.
#
# The toggle binding lives here; the actual theme application is at the end.

# --- Theme toggle (prefix T) ------------------------------------------------
bind -N "Toggle theme (catppuccin/dracula)" T if-shell -F '#{==:#{TMUX_THEME},dracula}' \
  'set-environment -g TMUX_THEME catppuccin ; source-file ~/.tmux.conf ; display-message "theme: catppuccin"' \
  'set-environment -g TMUX_THEME dracula ; source-file ~/.tmux.conf ; display-message "theme: dracula"'

# =============================================================================
# Plugins (via TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'omerxx/tmux-sessionx'

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

set -g @sessionx-bind 'o'
set -g @sessionx-window-mode 'on'
set -g @sessionx-zoxide-mode 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'

# =============================================================================
# Theme application — LAST, after TPM, so the selected theme always wins
# =============================================================================
%if "#{==:#{TMUX_THEME},dracula}"

# --- Dracula (cloned to ~/.tmux/dracula by install.sh; run-shell, not TPM) ---
set -g status-position top
set -g @dracula-plugins 'cpu-usage ram-usage battery time'
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon session
set -g @dracula-show-flags true
# Self-bootstrapping: clones dracula on first use (like lazy.nvim does for
# nvim plugins), so no install script is required. install.sh / install-light.sh
# pre-fetch it too, which just makes the first toggle instant.
run-shell "if [ ! -x ~/.tmux/dracula/dracula.tmux ]; then tmux display-message 'dracula: fetching theme…'; git clone -q --depth 1 https://github.com/dracula/tmux ~/.tmux/dracula >/dev/null 2>&1; fi; [ -x ~/.tmux/dracula/dracula.tmux ] && ~/.tmux/dracula/dracula.tmux || tmux display-message 'dracula: fetch failed (offline?) — theme unchanged'"

%else

# --- Status Bar (Catppuccin Mocha theme) ------------------------------------
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left
set -g status-left-length 50
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#89b4fa] "

# Window tabs
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[bg=#313244,fg=#cba6f7,bold]  #I:#W #[default]"
setw -g window-status-separator ""

# Right
set -g status-right-length 80
set -g status-right "#[fg=#6c7086]  #{?client_prefix,#[fg=#f38ba8]PREFIX,} #[fg=#a6adc8]│ %H:%M #[fg=#a6adc8]│ %b %d "

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message style
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

%endif
