# =============================================================================
# Starship Prompt Configuration
# =============================================================================
# Docs: https://starship.rs/config/

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$golang\
$ruby\
$nodejs\
$python\
$rust\
$terraform\
$docker_context\
$kubernetes\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 4
truncation_symbol = "…/"
style = "bold blue"

[git_branch]
symbol = " "
style = "bold purple"
truncation_length = 30

[git_status]
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
stashed = '\$${count}'

[git_state]
style = "bold yellow"

[golang]
symbol = " "
style = "bold cyan"

[ruby]
symbol = " "
style = "bold red"

[nodejs]
symbol = " "
style = "bold green"

[python]
symbol = " "
style = "bold yellow"

[rust]
symbol = " "
style = "bold orange"

[terraform]
symbol = "󱁢 "
style = "bold 105"

[docker_context]
symbol = " "
style = "bold blue"

[kubernetes]
disabled = false
symbol = "⎈ "
style = "bold blue"
format = '[$symbol$context( \($namespace\))]($style) '

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold yellow"

[time]
disabled = true
